spring:
  application:
    name: biblioteca-virtual

  #Configuração do PostgreSQL (Conectando-se ao Docker)
  datasource:
    url: jdbc:postgresql://localhost:5432/biblioteca_db
    username: dbadmin
    password: p@ssw0rd!@#
    driver-class-name: org.postgresql.Driver

  #Configuração do Hibernate/JPA
  jpa:
    hibernate:
      ddl-auto: validate # Deixamos 'validate' porque o Flyway fará a criação das tabelas
    show-sql: true #Irá mostrar as queries no console para facilitar o debug, caso necessário.
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  #Configuração do Flyway Migrations
  flyway:
    enabled: true
    baseline-on-migrate: true

  #Configuração de Erros
  web:
    error:
      include-stacktrace: never
      include-message: always
      include-exception: false

#Configuração da porta do servidor(é a porta padrão)
server:
  port: 8080